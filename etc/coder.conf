#!/bin/sh
# coder.conf: Central configuration for coder agent and server
# Optimized for: FreeBSD 15 | GTX 1650 Ti 4GB | Intel Iris Xe ~7GB

# --- Paths ---
# Robust root detection: check if etc/coder.conf exists in current or parent of script
_EXE=$(realpath "$0")
_DIR=$(dirname "$_EXE")
if [ -f "$_DIR/etc/coder.conf" ]; then
    _ROOT="$_DIR"
else
    _ROOT=$(dirname "$_DIR")
fi
CODER_ROOT="${CODER_ROOT:-$_ROOT}"
LLAMA_SERVER="$CODER_ROOT/llama.cpp/build/bin/llama-server"
LLAMA_EMBED="$CODER_ROOT/llama.cpp/build/bin/llama-embedding"

# --- Models ---
# Agent uses 7B for 15-20 tok/s speed; 14B remains available for heavy reasoning
MODEL_7B="$CODER_ROOT/models/Qwen2.5-Coder-7B-Q5_K_M.gguf"
MODEL_14B="$CODER_ROOT/models/Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf"
MODEL_DRAFT="$CODER_ROOT/models/Qwen2.5-Coder-0.5B-Q8_0.gguf"
MODEL_EMBED="$CODER_ROOT/models/nomic-embed-text-v1.5.Q8_0.gguf"

# Default to 7B for the agentic loop
MODEL_PATH="${CODER_MODEL:-$MODEL_7B}"

# --- Network ---
HOST="${CODER_HOST:-127.0.0.1}"
PORT="${CODER_PORT:-8080}"
API_URL="http://${HOST}:${PORT}"

# --- Context & memory ---
CTX_SIZE="${CODER_CTX:-8192}"

# --- Hardware Allocation ---
# For 7B: 2.5,1.5 (NVIDIA-heavy split) fits ~5.2GB model + KV cache in combined VRAM
# For 14B: 0.7,1.3 (Split across both) is required.
if echo "$MODEL_PATH" | grep "14B" > /dev/null; then
    TENSOR_SPLIT="0.7,1.3"
else
    TENSOR_SPLIT="2.5,1.5"
fi
DEVICES="Vulkan0,Vulkan1"
NUM_SLOTS=2

# --- Threads: i5-1135G7 = 4P cores / 8 logical ---
THREADS=4
THREADS_BATCH=6

# --- Agent ---
MAX_TURNS="${CODER_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${CODER_TIMEOUT:-600}"

# --- Runtime ---
CODER_STATE="$CODER_ROOT/var"
LOG_DIR="$CODER_ROOT/var/log"
CACHE_DIR="$CODER_ROOT/var/cache"
