#!/bin/sh
# coder.conf: Central configuration for coder agent and server
# Source this file from bin/ scripts: . "$SCRIPT_DIR/../etc/coder.conf"

# --- Paths ---
CODER_ROOT="${CODER_ROOT:-$(dirname "$(dirname "$(realpath "$0")")")}"
LLAMA_SERVER="$CODER_ROOT/llama.cpp/build/bin/llama-server"
LLAMA_EMBED="$CODER_ROOT/llama.cpp/build/bin/llama-embedding"

# --- Models ---
MODEL_PRIMARY="$CODER_ROOT/models/Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf"
MODEL_BACKUP="$CODER_ROOT/models/Qwen2.5-Coder-14B-Instruct-Q3_K_M.gguf"
MODEL_DRAFT="$CODER_ROOT/models/Qwen2.5-Coder-0.5B-Q8_0.gguf"
MODEL_EMBED="$CODER_ROOT/models/nomic-embed-text-v1.5.Q8_0.gguf"
MODEL_PATH="${CODER_MODEL:-$MODEL_PRIMARY}"

# --- Network ---
HOST="${CODER_HOST:-127.0.0.1}"
PORT="${CODER_PORT:-8080}"
API_URL="http://${HOST}:${PORT}"

# --- Context & memory ---
CTX_SIZE="${CODER_CTX:-8192}"

# --- Hardware: GTX 1650 Ti (4GB) + Intel Iris Xe (~7GB shared) ---
# Tensor split: Intel-heavy for 14B model
# NVIDIA gets ~35% of layers, Intel gets ~65%
TENSOR_SPLIT="0.7,1.3"
DEVICES="Vulkan0,Vulkan1"

# --- Threads: i5-1135G7 = 4P cores / 8 logical ---
THREADS=4
THREADS_BATCH=6

# --- Agent ---
MAX_TURNS="${CODER_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${CODER_TIMEOUT:-300}"

# --- Runtime ---
CODER_STATE="$CODER_ROOT/var"
LOG_DIR="$CODER_ROOT/var/log"
CACHE_DIR="$CODER_ROOT/var/cache"
