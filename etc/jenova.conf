#!/bin/sh
# jenova.conf: Central configuration for Jenova Cognitive Architecture
# FreeBSD 15 | GTX 1650 Ti 4GB | i5-1135G7 | 16GB RAM | 27GB Optane NVMe swap
#
# Architecture: CPU-predominant inference with partial NVIDIA GPU offload.
# Model weights load via mmap (no mlock). Layers beyond GPU capacity stay in
# CPU address space where FreeBSD pages them through 27 GiB Optane NVMe swap.
# Optane's ~7μs random read latency (vs ~100μs NAND) makes this viable.

# --- Paths ---
# When sourced: JENOVA_ROOT should be set by the calling script.
# When executed directly: auto-detect from script location.
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    else
        _ROOT=$(dirname "$_DIR")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Models ---
# Primary model: Qwen2.5-Coder-7B-Instruct — all 28 layers fit on dual-GPU, full offload.
MODEL_7B="$JENOVA_ROOT/models/Qwen2.5-Coder-7B-Instruct-Q5_K_M.gguf"
MODEL_DRAFT="$JENOVA_ROOT/models/Qwen2.5-Coder-0.5B-Instruct-Q8_0.gguf"
MODEL_EMBED="$JENOVA_ROOT/models/nomic-embed-text-v1.5.Q8_0.gguf"

MODEL_PATH="${JENOVA_MODEL:-$MODEL_7B}"

# --- Speculative decoding: 0.5B drafter accelerates 7B target ---
# Enabled by default. Set JENOVA_DRAFT=0 to disable.
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"

# --- Network ---
# HOST is the bind address (0.0.0.0 to listen on all interfaces).
# Clients (Neovim, CLI) automatically map wildcard binds (0.0.0.0, ::, *) to 127.0.0.1
# when connecting via JENOVA_CONNECT_HOST (set at runtime by bin/jvim and bin/jenova).
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
API_URL="http://${HOST}:${PORT}"
LLAMA_URL="http://${HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Dual-GPU offload via Vulkan ---
# Vulkan0 = NVIDIA GTX 1650 Ti (4 GiB discrete VRAM)
# Vulkan1 = Intel Iris Xe TGL GT2 (UMA, ~7 GiB addressable from system RAM)
# Combined: ~11 GiB addressable GPU memory across both devices.
# TENSOR_SPLIT: NVIDIA GTX 1650 Ti = 4 GiB discrete GDDR6, Intel Xe = ~7 GiB UMA.
# 1.0:1.8 lets Intel carry more layers (more headroom) while NVIDIA handles its 4 GiB cleanly.
# -fitt 768 reserves 768 MiB safety margin so KV cache fits without OOM.
DEVICES="${JENOVA_DEVICES:-Vulkan0,Vulkan1}"
TENSOR_SPLIT="${JENOVA_TS:-1.0,1.8}"
FIT_TARGET="${JENOVA_FITT:-768}"

# GPU layers: 7B (28 layers) — all layers fit on dual-GPU (~4.4 GiB across both).
# With -fitt 768, llama.cpp auto-tunes actual layer distribution.
NGL_7B="${JENOVA_NGL_7B:-all}"

# --- Context & Slots (7B: 16k context, 2 parallel slots) ---
# 7B at Q5_K_M with 16k context + 2 slots fits in ~9 GiB GPU memory with -fitt 768.
# KV cache uses q8_0 quantization to halve KV memory vs f16.
CTX_SIZE="${JENOVA_CTX:-16384}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads: i5-1135G7 = 4P cores / 8 logical (override with JENOVA_THREADS / JENOVA_THREADS_BATCH) ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)
# jenova-ca watch    — standalone watchdog for already-running services
# jenova-ca start --watch — start services then enter watchdog loop

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
