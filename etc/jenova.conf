#!/bin/sh
# jenova.conf: Central configuration for Jenova Cognitive Architecture
# Optimized for: FreeBSD 15 | GTX 1650 Ti 4GB | Intel Iris Xe ~7GB | Optane-paging

# --- Paths ---
# Robust root detection: check if etc/jenova.conf exists in current or parent of script
_EXE=$(realpath "$0")
_DIR=$(dirname "$_EXE")
if [ -f "$_DIR/etc/jenova.conf" ]; then
    _ROOT="$_DIR"
else
    _ROOT=$(dirname "$_DIR")
fi
JENOVA_ROOT="${JENOVA_ROOT:-$_ROOT}"
CODER_ROOT="$JENOVA_ROOT" # Compatibility
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"
LLAMA_EMBED="$JENOVA_ROOT/llama.cpp/build/bin/llama-embedding"

# --- Models ---
# Jenova uses 7B for speed; 14B remains available for heavy reasoning
MODEL_7B="$JENOVA_ROOT/models/Qwen2.5-Coder-7B-Q5_K_M.gguf"
MODEL_14B="$JENOVA_ROOT/models/Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf"
MODEL_DRAFT="$JENOVA_ROOT/models/Qwen2.5-Coder-0.5B-Q8_0.gguf"
MODEL_EMBED="$JENOVA_ROOT/models/nomic-embed-text-v1.5.Q8_0.gguf"

# Default to 7B for maximum speed
MODEL_PATH="${JENOVA_MODEL:-$MODEL_7B}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
API_URL="http://${HOST}:${PORT}"
LLAMA_URL="http://${HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${HOST}:${LLAMA_EMBED_PORT}"

# --- Context & memory ---
CTX_SIZE="${JENOVA_CTX:-16384}"
LLAMA_NGL="${JENOVA_NGL:-10}"

# --- Hardware Allocation (Jenova Optane-paging Optimization) ---
# Main model: both GPUs visible, Vulkan0 (NVIDIA) primary, Vulkan1 (Iris) as compute offload.
# Embed model: Iris Xe only (Vulkan1) — keeps NVIDIA free for main model.
EMBED_DEVICES="Vulkan1"
NUM_SLOTS=2

# --- Threads: i5-1135G7 = 4P cores / 8 logical ---
THREADS=4
THREADS_BATCH=6

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
