#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — dGPU-Only 7B Profile (Optane)
# FreeBSD 15 | GTX 1650 Ti 4GB (sole GPU) | i5-1135G7 | 16GB RAM | Optane NVMe
#
# Architecture: Partial GPU offload, no speculative decoding.
# Qwen2.5-Coder-7B-Instruct Q5_K_M (~4.8 GiB) — exceeds 4 GiB dGPU VRAM.
# ~22 of 28 layers on GTX 1650 Ti, remainder on CPU.
# No drafter — 0.5B model would consume 644 MiB of the tight VRAM budget.
# Intel Iris Xe iGPU deliberately excluded — avoids UMA contention.
# Optane NVMe swap provides fast paging (~7 μs) for CPU-resident layers.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    elif [ -f "$(dirname "$_DIR")/etc/jenova.conf" ]; then
        _ROOT=$(dirname "$_DIR")
    else
        _ROOT=$(dirname "$(dirname "$(dirname "$(dirname "$_DIR")")")")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

MODEL_PATH="${JENOVA_MODEL:-$MODEL_7B}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding: DISABLED ---
# 7B Q5_K_M (~4.8 GiB) already exceeds the 4 GiB dGPU VRAM.
# No budget for the 0.5B drafter (~644 MiB). Disable to avoid OOM.
JENOVA_DRAFT="${JENOVA_DRAFT:-0}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Single dGPU via Vulkan (partial offload) ---
# Vulkan0 = NVIDIA GTX 1650 Ti (4 GiB discrete GDDR6)
# iGPU excluded — no Vulkan1 device.
# 7B Q5_K_M (~4.8 GiB) exceeds 4 GiB — partial offload required.
# ~22 of 28 layers on GPU; 6 layers remain on CPU (i5-1135G7 Tiger Lake).
# FIT_TARGET=256: reserve margin for output-head tensor (~579 MiB for Qwen2.5-7B
# 152064 vocab), KV cache, and Vulkan compute buffers on 4 GiB dGPU.
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-256}"

# GPU layers: 7B Q5_K_M (28 layers) — partial offload, ~22 on GPU.
# 4 GiB dGPU: pushing all 28 layers OOMs; keep at 22 to leave room for
# KV cache, compute buffers, and the output-head tensor.
NGL_7B="${JENOVA_NGL_7B:-22}"

# --- Context & Slots ---
# 7B partial offload with q8_0 KV: 8k ctx * 1 slot ≈ 64 MiB KV.
# Single slot avoids doubling KV in already-tight VRAM.
# Model loaded from swap-backed mdmfs at /mnt/jenova-models.
# Optane NVMe swap pages CPU-resident layer data at ~7 μs latency.
CTX_SIZE="${JENOVA_CTX:-8192}"
NUM_SLOTS="${JENOVA_SLOTS:-1}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads: i5-1135G7 = 4P cores / 8 logical ---
# CPU handles 6 of 28 layers — threads matter more in this profile.
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Batch sizes (controls VRAM pressure during prompt ingestion) ---
# Reduced for tight-VRAM GPUs (4 GiB dGPU / 2-4 GiB UMA) to prevent
# Vulkan OOM that thrashes model weights out of VRAM onto swap.
BATCH_SIZE="${BATCH_SIZE:-${JENOVA_BATCH:-512}}"
UBATCH_SIZE="${UBATCH_SIZE:-${JENOVA_UBATCH:-128}}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)

# --- Health timeout ---
# 7B Q5_K_M (~4.8 GiB) partially on CPU — slower cold start than full GPU offload.
# Optane swap helps but CPU layer init adds latency.
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-120}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
