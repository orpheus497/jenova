#!/bin/sh
# jenova.conf: Vulkan Single dGPU Profile (GTX 1650 Ti)
# Main model on dGPU (Vulkan0), Speculative/Draft & Embedding models on CPU

# --- Paths ---
if [ -z "${JENOVA_ROOT:-}" ]; then
    # Auto-detect JENOVA_ROOT based on this file's location (assuming etc/jenova.conf)
    _SELF_DIR="$(cd "$(dirname "$0")" && pwd)"
    JENOVA_ROOT="$(dirname "$_SELF_DIR")"
fi
export JENOVA_ROOT

LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/llama.cpp/build/bin/llama-server}"

# --- Model Auto-Discovery ---
# shellcheck disable=SC1091
if [ -f "$JENOVA_ROOT/lib/jenova-model.sh" ]; then
    . "$JENOVA_ROOT/lib/jenova-model.sh"
fi

# --- Models ---
MODEL_4B="${MODEL_4B:-$JENOVA_ROOT/models/agent/Qwen3-Instruct-4B-Q6_K.gguf}"
MODEL_DRAFT_DEFAULT="${MODEL_DRAFT_DEFAULT:-$JENOVA_ROOT/models/draft/Qwen2.5-Coder-0.5B-Instruct-Q8_0.gguf}"
MODEL_EMBED_DEFAULT="${MODEL_EMBED_DEFAULT:-$JENOVA_ROOT/models/embed/Qwen3-Embedding-0.6B-Q8_0.gguf}"

MODEL_PATH="${JENOVA_MODEL:-$MODEL_4B}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT_DEFAULT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED_DEFAULT}"

# --- Speculative Decoding (Disabled) ---
JENOVA_DRAFT="${JENOVA_DRAFT:-0}"
DRAFT_DEVICE="${DRAFT_DEVICE:-none}"
DRAFT_NGL="${DRAFT_NGL:-0}"

# --- Hardware: Vulkan for main offload (dGPU only) ---
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
NGL_7B="${JENOVA_NGL_7B:-all}"
FIT_TARGET="${JENOVA_FITT:-512}"

# --- Context & Slots ---
CTX_SIZE="${JENOVA_CTX_SIZE:-8192}"
NUM_SLOTS="${JENOVA_NUM_SLOTS:-1}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"

# Internal API access usually prefers localhost even if binding to all interfaces
API_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then
    API_HOST="127.0.0.1"
fi
API_URL="${JENOVA_API_URL:-http://${API_HOST}:${PORT}}"

# --- Runtime ---
JENOVA_STATE="${JENOVA_STATE:-$JENOVA_ROOT/.jenova}"
LOG_DIR="${JENOVA_LOG_DIR:-$JENOVA_ROOT/var/log}"
CACHE_DIR="${JENOVA_CACHE_DIR:-$JENOVA_ROOT/var/cache}"
PID_FILE="${JENOVA_PID_FILE:-$JENOVA_STATE/jenova-ca.pid}"
