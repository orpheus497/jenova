#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — Dual-GPU 3B Profile
# FreeBSD 15 | GTX 1650 Ti 4GB | Intel Iris Xe ~7GB UMA | i5-1135G7 | 16GB RAM
#
# Architecture: Full dual-GPU offload with speculative decoding.
# Qwen2.5-Coder-3B-Instruct Q8_0 (~3.1 GiB) — compact model, maximum GPU headroom.
# 3B at Q8_0 fits easily on either device alone; dual GPU gives room for wide context.
# No swap-backed model filesystem required.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    elif [ -f "$(dirname "$_DIR")/etc/jenova.conf" ]; then
        _ROOT=$(dirname "$_DIR")
    else
        _ROOT=$(dirname "$(dirname "$(dirname "$(dirname "$_DIR")")")")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
# Model discovery is centralized in lib/jenova-model.sh to avoid duplication.
# It defines _find_model() and sets MODEL_AGENT, MODEL_DRAFT, MODEL_EMBED.
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding: disabled for 4B model on limited VRAM ---
JENOVA_DRAFT="${JENOVA_DRAFT:-0}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-CUDA0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Dual-GPU offload via Vulkan ---
# Vulkan0 = NVIDIA GTX 1650 Ti (4 GiB discrete GDDR6)
# Vulkan1 = Intel Iris Xe TGL GT2 (UMA, ~7 GiB from system RAM)
# 3B Q8_0 (~3.1 GiB) fits on either device; dual GPU leaves ~8 GiB free for KV.
DEVICES="${JENOVA_DEVICES:-Vulkan0,Vulkan1}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-512}"

# GPU layers: 3B Q8_0 (36 layers) — full offload across dual-GPU.
NGL_AGENT="${JENOVA_NGL_AGENT:-all}"

# --- Context & Slots ---
# 3B Q8_0 with q8_0 KV: 32k ctx * 2 slots ≈ 512 MiB KV.
# Total: ~3.1 GiB model + 0.5 GiB KV + 0.6 GiB draft ≈ 4.2 GiB. Plenty of headroom.
CTX_SIZE="${JENOVA_CTX:-32768}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads: i5-1135G7 = 4P cores / 8 logical ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Batch sizes (controls VRAM pressure during prompt ingestion) ---
# Higher values = faster prompt eval but more VRAM staging buffers.
# Reduce on tight-VRAM GPUs to prevent Vulkan OOM and weight eviction.
BATCH_SIZE="${JENOVA_BATCH:-2048}"
UBATCH_SIZE="${JENOVA_UBATCH:-512}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)

# --- Health timeout ---
# 3B Q8_0 (~3.1 GiB) loads quickly from standard storage.
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-60}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
