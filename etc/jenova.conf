#!/bin/sh
# jenova.conf: Central configuration for Jenova Cognitive Architecture
# FreeBSD 15 | GTX 1650 Ti 4GB | i5-1135G7 | 16GB RAM | 27GB Optane NVMe swap
#
# Architecture: CPU-predominant inference with partial NVIDIA GPU offload.
# Model weights load via mmap (no mlock). Layers beyond GPU capacity stay in
# CPU address space where FreeBSD pages them through 27 GiB Optane NVMe swap.
# Optane's ~7μs random read latency (vs ~100μs NAND) makes this viable.

# --- Paths ---
_EXE=$(realpath "$0")
_DIR=$(dirname "$_EXE")
if [ -f "$_DIR/etc/jenova.conf" ]; then
    _ROOT="$_DIR"
else
    _ROOT=$(dirname "$_DIR")
fi
JENOVA_ROOT="${JENOVA_ROOT:-$_ROOT}"
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Models ---
MODEL_7B="$JENOVA_ROOT/models/Qwen2.5-Coder-7B-Q5_K_M.gguf"
MODEL_14B="$JENOVA_ROOT/models/Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf"
MODEL_DRAFT="$JENOVA_ROOT/models/Qwen2.5-Coder-0.5B-Q8_0.gguf"
MODEL_EMBED="$JENOVA_ROOT/models/nomic-embed-text-v1.5.Q8_0.gguf"

MODEL_PATH="${JENOVA_MODEL:-$MODEL_14B}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
API_URL="http://${HOST}:${PORT}"
LLAMA_URL="http://${HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Dual-GPU offload via Vulkan ---
# Vulkan0 = NVIDIA GTX 1650 Ti (4 GiB discrete VRAM)
# Vulkan1 = Intel Iris Xe TGL GT2 (UMA, ~7 GiB addressable from system RAM)
# Combined: ~11 GiB addressable GPU memory across both devices.
# TENSOR_SPLIT ratio 2:1 gives NVIDIA 2 parts, Intel 1 part (matches VRAM ratio).
# -fitt 768 reserves 768 MiB safety margin so KV cache fits without OOM.
DEVICES="${JENOVA_DEVICES:-Vulkan0,Vulkan1}"
TENSOR_SPLIT="${JENOVA_TS:-2.0,1.0}"
FIT_TARGET="${JENOVA_FITT:-768}"

# GPU layers: transformer layers offloaded across both GPUs.
# With dual-GPU + -fitt 768, llama.cpp auto-tunes actual distribution.
# 7B (28 layers): all layers fit on GPU (~4.4 GiB total across both)
# 14B (48 layers): ~30 layers on GPU (~8 GiB), rest on CPU via mmap
NGL_7B="${JENOVA_NGL_7B:-all}"
NGL_14B="${JENOVA_NGL_14B:-33}"

# --- Context & Slots (defaults for 14B primary) ---
CTX_SIZE="${JENOVA_CTX:-8192}"
NUM_SLOTS="${JENOVA_SLOTS:-1}"

# --- Threads: i5-1135G7 = 4P cores / 8 logical ---
THREADS=4
THREADS_BATCH=6

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
