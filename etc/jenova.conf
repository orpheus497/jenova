#!/bin/sh
# jenova.conf: Vulkan Single dGPU Profile (GTX 1650 Ti)
# NVIDIA GTX 1650 Ti (Vulkan)
# 8k Context, Speculative Decoding Disabled
#
# Jenova Cognitive Architecture — Runtime Configuration Template
# This file serves as a comprehensive template for hardware-specific profiles.
# Each hardware profile should contain a customized version of this file.

# --- Paths ---
# JENOVA_ROOT is typically determined automatically by the launcher scripts.
if [ -z "$JENOVA_ROOT" ]; then
    echo "Error: JENOVA_ROOT is not set. This file must be sourced by a Jenova launcher." >&2
    echo "       Set JENOVA_ROOT to the project root before sourcing this jenova.conf." >&2
    return 1 2>/dev/null || exit 1
fi

# Path to the llama-server binary.
JENOVA_HOME="${JENOVA_HOME:-$HOME/Jenova}"; export JENOVA_HOME
if [ -z "$LLAMA_SERVER" ]; then
    if [ "$JENOVA_LAYOUT" = "installed" ]; then
        JENOVA_ROOT="${JENOVA_ROOT:-$JENOVA_HOME}"
        LLAMA_SERVER="$JENOVA_ROOT/bin/llama-server"
    else
        _script="$0"
        [ "${_script#*/*}" = "${_script}" ] && _script=$(command -v "$_script" 2>/dev/null || echo "$_script")
        _script_dir=$(dirname "$_script")
        command -v realpath >/dev/null 2>&1 && _script_dir=$(dirname "$(realpath "$_script")")
        JENOVA_ROOT="$(cd "${JENOVA_ROOT:-$_script_dir/..}" && pwd)"
        if [ -f "$JENOVA_ROOT/bin/llama-server" ]; then
            LLAMA_SERVER="$JENOVA_ROOT/bin/llama-server"
        else
            LLAMA_SERVER="$JENOVA_ROOT/external/llama.cpp/build/bin/llama-server"
        fi
    fi
fi

# --- Model Auto-Discovery ---
# This script scans the models/ directory and sets default model paths.
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# JENOVA_MODEL: Path to the main agent model.
MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"

# JENOVA_DRAFT_MODEL: Path to the speculative decoding draft model.
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"

# JENOVA_EMBED_MODEL: Path to the embedding model for RAG.
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative Decoding ---
# Disabled as requested
JENOVA_DRAFT="${JENOVA_DRAFT:-0}"

# DRAFT_DEVICE: The GPU device to use for the draft model in a multi-GPU setup.
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan0}"

# --- Network ---
# HOST: IP address to bind the servers to.
HOST="${JENOVA_HOST:-127.0.0.1}"

# PORT: Port for the main jenova-ca proxy.
PORT="${JENOVA_PORT:-8080}"

# LLAMA_PORT: Port for the main llama.cpp agent model server.
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"

# LLAMA_EMBED_PORT: Port for the llama.cpp embedding model server.
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"

# Internal URLs used by the agent. Automatically constructed.
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Single Vulkan GPU (4GB VRAM) ---
# Vulkan0 = NVIDIA GTX 1650 Ti (4 GiB discrete GDDR6)
# 3B Q8_0 (~2.25 GiB) leaves ~1.75 GiB VRAM for KV cache and overhead.
# FIT_TARGET=512: reserve 512 MiB safety margin for Vulkan staging buffers.
# Some layers may automatically fall back to CPU if VRAM is exhausted.
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
TENSOR_SPLIT="${JENOVA_TENSOR_SPLIT:-}"
FIT_TARGET="${JENOVA_FITT:-512}"

# GPU layers: 3B Q8_0 (36 layers) — attempt full offload.
# With ~2.25 GiB model + 512 MiB reserve on a 4 GiB GPU, partial offload
# will only happen if KV cache grows too large.
NGL_AGENT="${JENOVA_NGL_AGENT:-all}"

# --- Context & Slots ---
# Context math for 4GB VRAM.
# 3B Q8_0 with q8_0 KV: 8k ctx * 1 slot ≈ 128 MiB KV.
# Total: ~2.25 GiB model + 128 MiB KV + 512 MiB reserve ≈ 2.87 GiB.
# NOTE: This fits effortlessly within 4GB VRAM.
# Do not increase CTX_SIZE or NUM_SLOTS drastically unless you have a larger GPU.
CTX_SIZE="${JENOVA_CTX:-8192}"
NUM_SLOTS="${JENOVA_SLOTS:-1}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threading & Batching ---
# Use 4 physical threads to handle any CPU-resident fallback layers efficiently.
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Batch sizes (controls VRAM pressure during prompt ingestion) ---
# Reduced for 4 GiB VRAM to prevent Vulkan OOM and weight eviction during prompt eval.
BATCH_SIZE="${JENOVA_BATCH:-512}"
UBATCH_SIZE="${JENOVA_UBATCH:-512}"

# --- Agent & Runtime ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS="${JENOVA_MAX_ACTIONS:-20}"
TIMEOUT="${JENOVA_TIMEOUT:-600}"
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-90}"
JENOVA_STATE="${JENOVA_STATE:-$JENOVA_HOME/.system}"
LOG_DIR="${LOG_DIR:-$JENOVA_ROOT/var/log}"
CACHE_DIR="${CACHE_DIR:-$JENOVA_ROOT/var/cache}"
PID_FILE="${PID_FILE:-$JENOVA_STATE/jenova-ca.pid}"
