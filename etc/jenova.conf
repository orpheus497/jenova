#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — 14B Dual-GPU Profile
# FreeBSD 15 | GTX 1650 Ti 4GB | i5-1135G7 | 16GB RAM | 27GB Optane NVMe swap
#
# Architecture: Full dual-GPU offload with speculative decoding.
# Qwen2.5-Coder-14B Q3_K_M (~6.8 GiB) fits entirely across both Vulkan GPUs
# (~11 GiB combined). 0.5B drafter accelerates via speculative decoding.
# Model loaded from swap-backed mdmfs at /mnt/jenova-models; Optane NVMe
# swap (~7μs) pages any overflow during KV cache growth.

# --- Paths ---
# When sourced: JENOVA_ROOT should be set by the calling script.
# When executed directly: auto-detect from script location.
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    elif [ -f "$(dirname "$_DIR")/etc/jenova.conf" ]; then
        _ROOT=$(dirname "$_DIR")
    else
        _ROOT=$(dirname "$(dirname "$_DIR")")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
# Model discovery is centralized in lib/jenova-model.sh to avoid duplication.
# It defines _find_model() and sets MODEL_7B, MODEL_DRAFT, MODEL_EMBED.
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_7B}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding: 0.5B drafter accelerates 14B target ---
# Same Qwen2.5-Coder family — good acceptance rate at 14B.
# Draft model runs full GPU offload (-ngld all); at 644 MiB it fits easily.
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan0}"

# --- Network ---
# HOST is the bind address. For LAN access, set JENOVA_HOST=0.0.0.0 to listen on all interfaces.
# Default 127.0.0.1 only accepts local connections — remote Neovim clients will be refused.
# Clients (Neovim, CLI) automatically map wildcard binds (0.0.0.0, ::, *) to 127.0.0.1
# when connecting via JENOVA_CONNECT_HOST (set at runtime by bin/jvim and bin/jenova).
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
# Internal URLs: map wildcard bind address to loopback for local health probes.
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Dual-GPU offload via Vulkan ---
# Vulkan0 = NVIDIA GTX 1650 Ti (4 GiB discrete GDDR6, ~128 GB/s bandwidth)
# Vulkan1 = Intel Iris Xe TGL GT2 (UMA, ~7 GiB from 16 GiB system RAM, ~34 GB/s DDR4)
# Combined: ~11 GiB addressable GPU memory across both devices.
# No explicit TENSOR_SPLIT — let -fitt probe free VRAM on each device and
# distribute layers automatically. A fixed split conflicts with -fitt.
# -fitt 768 reserves 768 MiB safety margin for KV cache + draft model.
DEVICES="${JENOVA_DEVICES:-Vulkan0,Vulkan1}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-768}"

# GPU layers: 14B Q3_K_M (~6.8 GiB) — full offload across dual-GPU.
# All 48 layers + draft model (644 MiB) fit within ~11 GiB combined GPU.
# -fitt auto-distributes: ~2.5 GiB on 1650 Ti, ~4.3 GiB on Iris Xe.
NGL_7B="${JENOVA_NGL_7B:-all}"

# --- Context & Slots (14B: 16k context, 2 parallel slots) ---
# 14B at Q3_K_M with 16k context + 2 slots + draft model fits within
# ~11 GiB GPU memory with -fitt 768. q8_0 KV cache halves memory vs f16.
CTX_SIZE="${JENOVA_CTX:-16384}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads: i5-1135G7 = 4P cores / 8 logical ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)
# jenova-ca watch    — standalone watchdog for already-running services
# jenova-ca start --watch — start services then enter watchdog loop

# --- Health timeout ---
# 14B model (~6.8 GiB) pages in quickly through Optane but allow headroom
# for cold start with swap-backed mount.
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-120}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
