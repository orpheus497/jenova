#!/bin/sh
# jenova.conf: Vulkan Single dGPU Profile (GTX 1650 Ti)
# Main model on dGPU (Vulkan0), Speculative/Draft & Embedding models on CPU

# --- Paths ---
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# --- Models ---
MODEL_4B="$JENOVA_ROOT/models/agent/Qwen3-Instruct-4B-Q6_K.gguf"
MODEL_DRAFT="$JENOVA_ROOT/models/draft/Qwen2.5-Coder-0.5B-Instruct-Q8_0.gguf"
MODEL_EMBED="$JENOVA_ROOT/models/embed/Qwen3-Embedding-0.6B-Q8_0.gguf"

MODEL_PATH="${JENOVA_MODEL:-$MODEL_4B}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative Decoding (Disabled) ---
JENOVA_DRAFT="0"
DRAFT_DEVICE="none"
DRAFT_NGL="0"

# --- Hardware: Vulkan for main offload (dGPU only) ---
DEVICES="Vulkan0"
NGL_7B="all"
FIT_TARGET="512"

# --- Context & Slots ---
CTX_SIZE="8192"
NUM_SLOTS="1"
KV_CACHE_TYPE="q8_0"

# --- Threads ---
THREADS="4"
THREADS_BATCH="6"

# --- Network ---
HOST="127.0.0.1"
PORT="8080"
LLAMA_PORT="8081"
LLAMA_EMBED_PORT="8082"

# Internal API access usually prefers localhost even if binding to all interfaces
API_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then
    API_HOST="127.0.0.1"
fi
API_URL="http://${API_HOST}:${PORT}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
