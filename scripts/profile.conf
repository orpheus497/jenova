
# profile.conf: Hardware Profile Detection Rules
# This file is a template. Each hardware profile directory contains a
# profile.conf that specifies the hardware it matches.
# See: hardware-profiles/README.md for more details.

# --- Profile Metadata ---
# PROFILE_NAME: A unique identifier for the profile.
# Should follow the directory structure, e.g., "Linux/AMD/apu/ryzen7-5700u-3b".
PROFILE_NAME="OS/Vendor/Type/Example-Profile"

# PROFILE_DESC: A human-readable description of the target hardware.
PROFILE_DESC="Example CPU | Example GPU | RAM"

# --- Matching Rules ---
# The detection script scores profiles based on these matches.
# The profile with the highest score is selected.
# All matches are case-insensitive.
# An empty value for a rule means it is not checked.

# MATCH_OS: Matches the operating system (e.g., "Linux", "FreeBSD", "Darwin").
MATCH_OS="Linux"

# MATCH_CPU: Matches a substring of the CPU model name (e.g., "Ryzen 7 5700U", "i5-1135G7").
MATCH_CPU="Example CPU"

# MATCH_GPU_0: A regex to match the primary GPU name.
MATCH_GPU_0="Example GPU"

# MATCH_GPU_1: A regex to match a secondary GPU name (for multi-GPU setups).
MATCH_GPU_1=""

# MATCH_SWAP: A regex to match the swap device information.
# Useful for profiles that rely on high-speed swap, like Optane.
# e.g., "nvme.*optane"
MATCH_SWAP="" # Optional: match specific swap devices, e.g., "nvme.*optane"

# Recommended models for the downloader script (model_dl.sh)
# These are suggestions; the final model is set in the profile's jenova.conf

# Agent model
RECOMMENDED_AGENT_MODEL="Qwen3.5-4B-Q6_K.gguf"
RECOMMENDED_AGENT_URL="https://huggingface.co/unsloth/Qwen3.5-4B-GGUF/resolve/main/Qwen3.5-4B-Q6_K.gguf"

# Draft model (for speculative decoding)
RECOMMENDED_DRAFT_MODEL="Qwen3.5-0.8B-Q8_0.gguf"
RECOMMENDED_DRAFT_URL="https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q8_0.gguf"

# Embedding model (for RAG)
RECOMMENDED_EMBED_MODEL="Qwen3-Embedding-0.6B-Q8_0.gguf"
RECOMMENDED_EMBED_URL="https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf"
