#!/bin/sh
# Hardware Profile: FreeBSD i5-1135G7 Dual-GPU — 14B Model (Optane swap-backed)
#
# Same i5-1135G7 dual-GPU hardware as the 7B profile but tuned for
# Qwen2.5-Coder-14B Q3_K_M (~6.8 GiB). Full GPU offload across both
# devices with speculative decoding enabled.
#
# Deploy with:
#   cp hardware-profiles/freebsd-i5-1135g7-dual-gpu-14b/jenova.conf etc/jenova.conf

PROFILE_NAME="freebsd-i5-1135g7-dual-gpu-14b"
PROFILE_DESC="FreeBSD 15 | i5-1135G7 | GTX 1650 Ti + Iris Xe | 16GB | Optane NVMe | 14B model"

# --- Detection patterns ---
MATCH_CPU="i5-1135G7"
MATCH_GPU_0="NVIDIA"
MATCH_GPU_1="Intel.*(Iris|Xe)"
MATCH_OS="FreeBSD"

# --- Hardware summary ---
HW_CPU="Intel i5-1135G7 (4P / 8T)"
HW_GPU_0="NVIDIA GTX 1650 Ti 4GB (Vulkan0) — discrete VRAM"
HW_GPU_1="Intel Iris Xe TGL GT2 (Vulkan1) — UMA, ~7 GiB from system RAM"
HW_RAM="16 GiB"
HW_SWAP="27 GiB Intel Optane NVMe"
HW_STORAGE="ZFS"
HW_GPU_TOTAL_VRAM="~11 GiB combined (4 GiB discrete + ~7 GiB UMA)"

# --- Inference strategy ---
STRATEGY="dual-gpu-full-offload-14b"
STRATEGY_DESC="14B Q3_K_M (~6.8 GiB) fully offloaded across dual Vulkan GPUs (~11 GiB combined). All 48 layers on GPU with -fitt auto-fit. 0.5B speculative drafter enabled. 16K context, 2 slots. Model on swap-backed mdmfs at /mnt/jenova-models."

# --- Key config values ---
PROFILE_DEVICES="Vulkan0,Vulkan1"
PROFILE_TENSOR_SPLIT=""
PROFILE_FIT_TARGET="768"
PROFILE_CTX_SIZE="16384"
PROFILE_NUM_SLOTS="2"
PROFILE_THREADS="4"
PROFILE_THREADS_BATCH="6"
PROFILE_NGL="all"
PROFILE_KV_TYPE="q8_0"
PROFILE_DRAFT="1"
PROFILE_HEALTH_TIMEOUT="120"
