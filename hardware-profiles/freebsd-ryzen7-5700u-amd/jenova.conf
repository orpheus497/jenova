#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — HP Laptop 15s-eq2xxx
# FreeBSD 15 | AMD Ryzen 7 5700U (8C/16T) | AMD Lucienne (Vega 8 UMA) | 15.28 GiB RAM
#
# Architecture: Hybrid CPU+GPU inference with partial AMD Vega 8 offload.
# The Vega 8 is UMA — it shares system RAM. With ~15 GiB total, the BIOS
# typically allocates 2-4 GiB for VRAM. We offload 18 of 28 layers to Vulkan
# and keep the rest on CPU. The 8-core Zen 2 handles CPU layers efficiently.
# ZFS swap (16 GiB) pages cold tensors but at standard NVMe latency (~100us),
# not Optane speeds — keep context conservative to avoid swap pressure.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    elif [ -f "$(dirname "$_DIR")/etc/jenova.conf" ]; then
        _ROOT=$(dirname "$_DIR")
    else
        _ROOT=$(dirname "$(dirname "$_DIR")")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
# Helper function: find first .gguf file in a directory
_find_model() {
    _dir="$1"
    if [ -d "$_dir" ]; then
        find "$_dir" -maxdepth 1 -name "*.gguf" -type f 2>/dev/null | sort | head -n 1
    fi
}

# --- Models ---
# Dynamic model detection from organized directories
_AGENT_MODEL_AUTO="$(_find_model "$JENOVA_ROOT/models/agent")"
if [ -n "$_AGENT_MODEL_AUTO" ]; then
    MODEL_7B="$_AGENT_MODEL_AUTO"
elif [ -f "$JENOVA_ROOT/models/Qwen2.5-Coder-7B-Instruct-Q5_K_M.gguf" ]; then
    MODEL_7B="$JENOVA_ROOT/models/Qwen2.5-Coder-7B-Instruct-Q5_K_M.gguf"
else
    MODEL_7B=""
fi

_DRAFT_MODEL_AUTO="$(_find_model "$JENOVA_ROOT/models/draft")"
if [ -n "$_DRAFT_MODEL_AUTO" ]; then
    MODEL_DRAFT="$_DRAFT_MODEL_AUTO"
elif [ -f "$JENOVA_ROOT/models/Qwen2.5-Coder-0.5B-Instruct-Q8_0.gguf" ]; then
    MODEL_DRAFT="$JENOVA_ROOT/models/Qwen2.5-Coder-0.5B-Instruct-Q8_0.gguf"
else
    MODEL_DRAFT=""
fi

_EMBED_MODEL_AUTO="$(_find_model "$JENOVA_ROOT/models/embed")"
if [ -n "$_EMBED_MODEL_AUTO" ]; then
    MODEL_EMBED="$_EMBED_MODEL_AUTO"
elif [ -f "$JENOVA_ROOT/models/nomic-embed-text-v1.5.Q8_0.gguf" ]; then
    MODEL_EMBED="$JENOVA_ROOT/models/nomic-embed-text-v1.5.Q8_0.gguf"
else
    MODEL_EMBED=""
fi

# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_7B}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding ---
# Enabled by default. The 0.5B drafter runs on CPU alongside the main model.
# With 8C/16T, there is enough headroom for speculative decoding.
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"

# --- Network ---
# HOST is the bind address. Default is loopback-only (127.0.0.1).
# For LAN serving (allow other machines to connect), set JENOVA_HOST=0.0.0.0.
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"

# Internal URLs: map wildcard bind to loopback for local health probes.
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi

API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Single AMD GPU via Vulkan (RADV driver) ---
# Vulkan0 = AMD Radeon Vega 8 (Lucienne) — UMA, ~2-4 GiB from system RAM.
# Single device — no tensor split needed.
# RADV (Mesa Vulkan driver) provides Vulkan support on FreeBSD.
# Ensure drm-kmod and gpu-firmware-amd-kmod are loaded.
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-512}"

# GPU layers: 7B (28 layers total) — partial offload.
# With ~2-4 GiB UMA VRAM, approximately 18 layers fit on GPU.
# Remaining 10 layers stay on CPU (fast with 8C/16T Zen 2).
# Adjust NGL up if BIOS VRAM allocation is increased (4 GiB+).
NGL_7B="${JENOVA_NGL_7B:-18}"

# --- Context & Slots ---
# Conservative context (8k) to reduce KV cache memory pressure.
# With UMA GPU sharing system RAM, large KV caches compete with model weights.
# q8_0 KV cache halves memory vs f16.
CTX_SIZE="${JENOVA_CTX:-8192}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads: Ryzen 7 5700U = 8 cores / 16 threads ---
# Use physical core count for inference threads, ~1.5x for batch processing.
# Zen 2 SMT provides ~30% IPC boost for batch operations.
THREADS="${JENOVA_THREADS:-8}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-12}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
