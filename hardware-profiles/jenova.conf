# jenova.conf: FreeBSD Optane NVMe Swap + dual GPU
#
# Strategy: Dual GPU partial offload. Intel Optane NVMe provides high-bandwidth 
# swap for CPU-bound layers.

# The model is an intelligent default and can be overridden via environment variables.
JENOVA_MODEL="models/agent/Qwen3.5-9B-Instruct-Q4_K_M.gguf"

# Hardware offload
JENOVA_DEVICES="Vulkan0,Vulkan1"
JENOVA_NGL_AGENT=24
JENOVA_CTX=8192
JENOVA_DRAFT=0

# Threading for 4C/8T
JENOVA_THREADS=4
JENOVA_THREADS_BATCH=4