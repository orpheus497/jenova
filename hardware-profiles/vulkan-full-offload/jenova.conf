#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — Vulkan Full Offload (8GB+ VRAM)
# Generic profile for systems with 8GB+ VRAM Vulkan-capable GPU
#
# Architecture: Full single-GPU offload for maximum performance.
# All transformer layers run on GPU. CPU handles only coordination.
# Suitable for NVIDIA RTX series (3060+), AMD RX series (6800+), Intel Arc (A770).
# 14B Q3_K_M (~6.8 GiB) fits entirely in 8+ GiB VRAM with room for KV cache.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    elif [ -f "$(dirname "$_DIR")/etc/jenova.conf" ]; then
        _ROOT=$(dirname "$_DIR")
    else
        _ROOT=$(dirname "$(dirname "$_DIR")")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_7B}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding ---
# 0.5B drafter accelerates 14B target. Same Qwen2.5-Coder family.
# Single GPU: draft model shares the same device as the main model.
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then
    _INT_HOST="127.0.0.1"
fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Single Vulkan GPU (8GB+ VRAM) ---
# Full offload: 14B Q3_K_M (~6.8 GiB) + KV cache + draft model fits in 8+ GiB.
# FIT_TARGET=1024: reserve 1 GiB for KV cache growth + draft model (644 MiB).
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-1024}"

# GPU layers: full offload — all layers on GPU via auto-fit.
NGL_7B="${JENOVA_NGL_7B:-all}"

# --- Context & Slots ---
# 14B Q3_K_M with q8_0 KV at 16k ctx * 2 slots ≈ 1.6 GiB KV.
# Total: ~6.8 GiB model + 1.6 GiB KV + 0.6 GiB draft ≈ 9 GiB. Fits 10-12 GiB GPUs.
# For 8 GiB GPUs, reduce to CTX=8192 or SLOTS=1 via env overrides.
CTX_SIZE="${JENOVA_CTX:-16384}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
