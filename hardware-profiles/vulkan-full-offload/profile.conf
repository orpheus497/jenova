#!/bin/sh
# Hardware Profile: Generic Vulkan Full Offload
# This file describes the hardware profile for auto-detection matching.

PROFILE_NAME="vulkan-full-offload"
PROFILE_DESC="Generic Vulkan GPU with 8GB+ VRAM (NVIDIA/AMD/Intel) — Full offload"

# --- Detection patterns (used by detect-hardware.sh) ---
# This is a catch-all profile for any system with a Vulkan-capable GPU
# that doesn't match more specific profiles.
# Detection score will be lower than specific profiles.
MATCH_GPU_0=".*"  # Match any GPU
MATCH_OS=""       # Any OS with Vulkan support

# --- Hardware summary ---
HW_CPU="Generic multi-core CPU (4+ cores recommended)"
HW_GPU_0="Vulkan-capable GPU with 8GB+ VRAM (NVIDIA RTX/AMD RX/Intel Arc)"
HW_RAM="16+ GiB recommended"
HW_SWAP="Optional (not required with sufficient VRAM)"
HW_GPU_TOTAL_VRAM="8+ GiB"

# --- Inference strategy ---
STRATEGY="full-offload"
STRATEGY_DESC="All 28 transformer layers fit on single GPU (8+ GiB VRAM). Full GPU offload minimizes CPU usage. Suitable for NVIDIA RTX 3060/4060, AMD RX 6800/7800, Intel Arc A770."

# --- Key config values (should match jenova.conf in this directory) ---
PROFILE_DEVICES="Vulkan0"
PROFILE_TENSOR_SPLIT=""
PROFILE_FIT_TARGET="1024"
PROFILE_CTX_SIZE="16384"
PROFILE_NUM_SLOTS="2"
PROFILE_THREADS="4"
PROFILE_THREADS_BATCH="6"
PROFILE_NGL="all"
PROFILE_KV_TYPE="q8_0"
