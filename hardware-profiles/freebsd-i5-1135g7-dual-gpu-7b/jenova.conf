#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — Dual-GPU 7B Profile (Optane Swap)
# FreeBSD 15 | GTX 1650 Ti 4GB | Intel Iris Xe ~7GB UMA | i5-1135G7 | 16GB RAM
#
# Architecture: Full dual-GPU offload with speculative decoding.
# Qwen2.5-Coder-7B-Instruct Q5_K_M (~4.8 GiB) across both Vulkan GPUs (~11 GiB combined).
# 0.5B drafter on Iris Xe accelerates generation via speculative decoding.
# Intel Optane NVMe swap-backed mdmfs provides fast context paging for large sessions.

# --- Paths ---
# When sourced: JENOVA_ROOT should be set by the calling script.
# When executed directly: auto-detect from script location.
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    elif [ -f "$(dirname "$_DIR")/etc/jenova.conf" ]; then
        _ROOT=$(dirname "$_DIR")
    else
        _ROOT=$(dirname "$(dirname "$_DIR")")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
# Model discovery is centralized in lib/jenova-model.sh to avoid duplication.
# It defines _find_model() and sets MODEL_7B, MODEL_DRAFT, MODEL_EMBED.
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_7B}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding: 0.5B drafter accelerates 7B target ---
# Same Qwen2.5-Coder family — high acceptance rate at 7B.
# DRAFT_DEVICE=Vulkan1 (Iris Xe UMA) keeps the 1650 Ti free for main model layers.
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan1}"

# --- Network ---
# HOST is the bind address. Default is loopback-only (127.0.0.1).
# Set JENOVA_HOST=0.0.0.0 to enable LAN access.
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
# Internal URLs: map wildcard bind address to loopback for local health probes.
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Dual-GPU offload via Vulkan ---
# Vulkan0 = NVIDIA GTX 1650 Ti (4 GiB discrete GDDR6, ~128 GB/s bandwidth)
# Vulkan1 = Intel Iris Xe TGL GT2 (UMA, ~7 GiB from system RAM, ~34 GB/s DDR4)
# 7B Q5_K_M (~4.8 GiB) fits well within 11 GiB combined. 1650 Ti carries most layers.
# -fitt auto-distributes: no explicit TENSOR_SPLIT (conflicts with -fitt).
# FIT_TARGET=512: 7B needs less reserve than larger models.
DEVICES="${JENOVA_DEVICES:-Vulkan0,Vulkan1}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-512}"

# GPU layers: 7B Q5_K_M (28 layers) — full offload across dual-GPU.
NGL_7B="${JENOVA_NGL_7B:-all}"

# --- Context & Slots ---
# 7B Q5_K_M with q8_0 KV: 16k ctx * 2 slots ≈ 917 MiB KV. Fits comfortably.
# Optane NVMe swap (~7 μs latency) pages KV overflow during long sessions.
# Model loaded from swap-backed mdmfs at /mnt/jenova-models for fast cold-start.
CTX_SIZE="${JENOVA_CTX:-16384}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads: i5-1135G7 = 4P cores / 8 logical (override with JENOVA_THREADS / JENOVA_THREADS_BATCH) ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)
# jenova-ca watch    — standalone watchdog for already-running services
# jenova-ca start --watch — start services then enter watchdog loop

# --- Health timeout ---
# 7B Q5_K_M (~4.8 GiB) loads quickly through Optane-backed swap.
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-60}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
