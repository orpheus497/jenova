#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — macOS Metal Profile
# Apple Silicon (M1/M2/M3/M4) with Metal GPU acceleration
#
# Architecture: Full Metal GPU offload for Apple Silicon unified memory.
# Agent model (e.g. Qwen3.5 4B) — optimized model for Apple Silicon performance.
# Metal Performance Shaders provide efficient GPU acceleration.
# Unified memory eliminates CPU↔GPU transfer bottlenecks.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    echo "Error: JENOVA_ROOT is not set. This file must be sourced by a Jenova launcher." >&2
    echo "       Set JENOVA_ROOT to the project root before sourcing this jenova.conf." >&2
    return 1 2>/dev/null || exit 1
fi
JCA_HOME="${JCA_HOME:-$HOME/JCA}"; export JCA_HOME
if [ "$JENOVA_LAYOUT" = "installed" ]; then
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/bin/llama-server}"
else
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/external/llama.cpp/build/bin/llama-server}"
fi

# --- Model Auto-Discovery ---
. "$JENOVA_ROOT/lib/jenova-model.sh"

# --- Models ---
# Models are auto-discovered by lib/jenova-model.sh (sourced above).
# Environment variables (JENOVA_MODEL, JENOVA_DRAFT_MODEL, JENOVA_EMBED_MODEL)
# take precedence if set.
MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"
# Note: MODEL_DRAFT and MODEL_EMBED are already set by jenova-model.sh

# --- Speculative decoding ---
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Metal0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"

_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi

API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Inference ---
# Apple Silicon Unified Memory: RAM is shared directly between CPU and GPU.
# No PCIe transfer overhead means we can use the full unified memory pool.
JENOVA_DEVICES="${JENOVA_DEVICES:-Metal0}"
JENOVA_TENSOR_SPLIT="${JENOVA_TENSOR_SPLIT:-}"

# Context math: 16k ctx * 2 slots with q8_0 KV uses ≈ 512 MiB Unified Memory.
# Total usage for 4B model: ~4 GiB model + 512 MiB KV ≈ 4.5 GiB.
# Works effortlessly on standard 8GB Mac M1/M2/M3 chips.
JENOVA_CTX_SIZE="${JENOVA_CTX_SIZE:-16384}"
JENOVA_NUM_SLOTS="${JENOVA_NUM_SLOTS:-2}"

# Threading: Keep slightly lower than performance cores to avoid thermal throttling.
JENOVA_THREADS="${JENOVA_THREADS:-4}"
JENOVA_THREADS_BATCH="${JENOVA_THREADS_BATCH:-8}"

# GPU offload: Metal acceleration processes all layers natively.
JENOVA_NGL="${JENOVA_NGL:-all}"
JENOVA_FIT_TARGET="${JENOVA_FIT_TARGET:-512}"

# --- Memory ---
JENOVA_KV_TYPE="${JENOVA_KV_TYPE:-q8_0}"
JENOVA_CACHE_TYPE_K="${JENOVA_CACHE_TYPE_K:-q8_0}"
JENOVA_CACHE_TYPE_V="${JENOVA_CACHE_TYPE_V:-q8_0}"

# --- Performance ---
JENOVA_FLASH_ATTN="${JENOVA_FLASH_ATTN:-1}"
JENOVA_MLOCK="${JENOVA_MLOCK:-0}"
JENOVA_MMAP="${JENOVA_MMAP:-1}"

# --- Logging ---
JENOVA_LOG_LEVEL="${JENOVA_LOG_LEVEL:-info}"
JENOVA_LOG_FILE="${JENOVA_LOG_FILE:-$JCA_HOME/var/log/llama-server.log}"

# --- Health monitoring ---
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-60}"