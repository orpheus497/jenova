#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — Vulkan Full Offload (8GB+ VRAM)
# Generic profile for systems with a Vulkan-capable GPU.
#
# Architecture: Full single-GPU offload for maximum performance.
# Qwen2.5-Coder-14B-Instruct Q4_K_M (~8.7 GiB) — best-quality agent on a single GPU.
# Requires 10+ GiB VRAM. For strict 8 GiB GPUs use JENOVA_CTX=8192 JENOVA_SLOTS=1.
# Suitable for NVIDIA RTX 3080/4070+ (10-12 GiB), AMD RX 6900/7900 (16 GiB), Intel Arc A770 (16 GiB).

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    elif [ -f "$(dirname "$_DIR")/etc/jenova.conf" ]; then
        _ROOT=$(dirname "$_DIR")
    else
        _ROOT=$(dirname "$(dirname "$(dirname "$(dirname "$_DIR")")")")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_7B}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding ---
# 0.5B drafter accelerates 14B Q4_K_M. Same Qwen2.5-Coder family.
# Draft model (~644 MiB) shares the same Vulkan device as the main model.
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then
    _INT_HOST="127.0.0.1"
fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Single Vulkan GPU (8GB+ VRAM) ---
# Full offload: 14B Q4_K_M (~8.7 GiB) + KV cache + draft model needs 10+ GiB VRAM.
# FIT_TARGET=1024: reserve 1 GiB safety margin for KV growth + draft model (644 MiB).
# For 8 GiB GPUs, set JENOVA_CTX=8192 and JENOVA_SLOTS=1 to reduce KV footprint.
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-1024}"

# GPU layers: 14B Q4_K_M (48 layers) — full offload via auto-fit.
NGL_7B="${JENOVA_NGL_7B:-all}"

# --- Context & Slots ---
# 14B Q4_K_M with q8_0 KV: 32k ctx * 2 slots ≈ 3.2 GiB KV.
# Total: ~8.7 GiB model + 3.2 GiB KV + 0.6 GiB draft ≈ 12.5 GiB. Use with 12+ GiB GPUs.
# For 8 GiB GPUs: export JENOVA_CTX=8192 JENOVA_SLOTS=1 before starting.
CTX_SIZE="${JENOVA_CTX:-32768}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Batch sizes (controls VRAM pressure during prompt ingestion) ---
# Higher values = faster prompt eval but more VRAM staging buffers.
# Reduce on tight-VRAM GPUs to prevent Vulkan OOM and weight eviction.
BATCH_SIZE="${JENOVA_BATCH:-2048}"
UBATCH_SIZE="${JENOVA_UBATCH:-512}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)

# --- Health timeout ---
# 14B Q4_K_M (~8.7 GiB) takes time to load. Allow headroom for slow storage.
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-90}"

# --- Runtime ---
JENOVA_STATE="$JENOVA_ROOT/.jenova"
LOG_DIR="$JENOVA_ROOT/var/log"
CACHE_DIR="$JENOVA_ROOT/var/cache"
PID_FILE="$JENOVA_STATE/jenova-ca.pid"
