#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — AMD Ryzen 7 5700U Profile
# FreeBSD 15 | AMD Ryzen 7 5700U (8C/16T) | AMD Vega 8 UMA | 15.28 GiB RAM
#
# Architecture: Hybrid CPU+GPU inference with partial AMD Vega 8 offload.
# Qwen2.5-Coder-3B-Instruct Q8_0 (~2.25 GiB) — compact model suited to limited UMA VRAM.
# The Vega 8 is UMA — it shares system RAM. BIOS allocates 2-4 GiB to GPU.
# With 3B Q8_0 (~2.25 GiB) and ~2-4 GiB UMA: partial offload is the safe default.
# Increase NGL if BIOS is set to 4 GiB UMA allocation.
# The 8C/16T Zen 2 CPU handles CPU-resident layers efficiently.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    echo "Error: JENOVA_ROOT is not set. This file must be sourced by a Jenova launcher." >&2
    echo "       Set JENOVA_ROOT to the project root before sourcing this jenova.conf." >&2
    return 1 2>/dev/null || exit 1
fi
JCA_HOME="${JCA_HOME:-$HOME/JCA}"; export JCA_HOME
if [ "$JENOVA_LAYOUT" = "installed" ]; then
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/bin/llama-server}"
else
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/external/llama.cpp/build/bin/llama-server}"
fi

# --- Model Auto-Discovery ---
# Model discovery is centralized in lib/jenova-model.sh to avoid duplication.
# It defines _find_model() and sets MODEL_AGENT, MODEL_DRAFT, MODEL_EMBED.
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding ---
# 0.5B drafter shares Vega 8 GPU. With limited UMA, disable if OOMs occur.
# Set JENOVA_DRAFT=0 to disable and free ~644 MiB VRAM for more context.
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan0}"

# --- Network ---
# HOST is the bind address. Default is loopback-only (127.0.0.1) to avoid exposing
# the unauthenticated proxy/llama/embed ports to the LAN by default.
# To enable LAN access explicitly, set JENOVA_HOST=0.0.0.0.
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"

# Internal URLs: map wildcard bind to loopback for local health probes.
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi

API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Single AMD GPU via Vulkan (RADV driver) ---
# Vulkan0 = AMD Radeon Vega 8 (Lucienne) — UMA, ~2-4 GiB from system RAM.
# RADV (Mesa Vulkan driver) required: ensure drm-kmod + gpu-firmware-amd-kmod are loaded.
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-256}"

# GPU layers: 3B Q8_0 (36 layers total) — partial offload.
# With ~2-4 GiB UMA VRAM, ~24 layers fit on GPU (model is ~2.25 GiB).
# Remaining layers stay on CPU (fast with 8C/16T Zen 2).
# Increase to 36 (all) if BIOS UMA allocation is 4 GiB and no drafter is loaded.
NGL_AGENT="${JENOVA_NGL_AGENT:-24}"

# --- Context & Slots ---
# Balanced context for UMA — more headroom than 8K without excessive swap pressure.
# 3B Q8_0 with q8_0 KV: 16k ctx * 2 slots ≈ 512 MiB KV. Manageable for UMA.
# Reduce to 8192 if swap pressure is observed (standard NVMe ~100 μs latency).
CTX_SIZE="${JENOVA_CTX:-16384}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads: Ryzen 7 5700U = 8 cores / 16 threads ---
# Use physical core count for inference threads, ~1.5x for batch processing.
THREADS="${JENOVA_THREADS:-8}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-12}"

# --- Batch sizes (controls VRAM pressure during prompt ingestion) ---
# Reduced for tight-VRAM GPUs (4 GiB dGPU / 2-4 GiB UMA) to prevent
# Vulkan OOM that thrashes model weights out of VRAM onto swap.
BATCH_SIZE="${JENOVA_BATCH:-512}"
UBATCH_SIZE="${JENOVA_UBATCH:-128}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Runtime ---
JENOVA_STATE="${JENOVA_STATE:-$JCA_HOME/.system}"
LOG_DIR="${LOG_DIR:-$JCA_HOME/var/log}"
CACHE_DIR="${CACHE_DIR:-$JCA_HOME/var/cache}"
PID_FILE="${PID_FILE:-$JENOVA_STATE/jenova-ca.pid}"
