#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — NVIDIA CUDA Generic Profile
#
# Architecture: Full single-GPU offload via CUDA.
# Optimized for NVIDIA RTX/GTX hardware.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    echo "Error: JENOVA_ROOT is not set. This file must be sourced by a Jenova launcher." >&2
    echo "       Set JENOVA_ROOT to the project root before sourcing this jenova.conf." >&2
    return 1 2>/dev/null || exit 1
fi
JCA_HOME="${JCA_HOME:-$HOME/JCA}"; export JCA_HOME
if [ "$JENOVA_LAYOUT" = "installed" ]; then
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/bin/llama-server}"
else
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/external/llama.cpp/build/bin/llama-server}"
fi

# --- Model Auto-Discovery ---
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding ---
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-CUDA0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"

# --- Hardware: NVIDIA CUDA ---
# Generic CUDA offload. Assuming modern RTX/GTX with 8GB+ VRAM.
# FIT_TARGET=768: reserve 768 MiB for CUDA staging buffers and contexts.
DEVICES="${JENOVA_DEVICES:-CUDA0}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-768}"

# GPU layers: full offload
# Typical 8GB VRAM fits ~4-5B models + KV cache fully.
NGL_AGENT="${JENOVA_NGL_AGENT:-all}"

# --- Context & Slots ---
# Context math: 16k ctx * 2 slots with q8_0 KV cache uses ≈ 512 MiB VRAM.
# Model (e.g., 3.5 GiB) + 512 MiB KV + 768 MiB reserve ≈ 4.8 GiB total VRAM.
# This comfortably fits on standard 6GB/8GB NVIDIA GPUs.
CTX_SIZE="${JENOVA_CTX:-16384}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads ---
# CPU threads used for prompt processing and any fallback layers.
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-8}"

# --- CUDA Specifics ---
# CUDA DMMV (Distributed Multi-Model VRAM) pool size in MiB
CUDA_DMMV_POOL_SIZE="${CUDA_DMMV_POOL_SIZE:-512}"

# --- Runtime ---
JENOVA_STATE="${JENOVA_STATE:-$JCA_HOME/.system}"
LOG_DIR="${LOG_DIR:-$JENOVA_ROOT/var/log}"
CACHE_DIR="${CACHE_DIR:-$JENOVA_ROOT/var/cache}"
PID_FILE="${PID_FILE:-$JENOVA_STATE/jenova-ca.pid}"
