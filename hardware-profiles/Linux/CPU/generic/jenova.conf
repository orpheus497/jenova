#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — Linux CPU Profile
# Generic multi-core CPU with Ryzen-optimized threading
#
# Architecture: CPU-only inference optimized for Ryzen performance characteristics.
# Qwen3.5-4B-Q8 — compact model suitable for CPU inference.
# Threading optimized based on Ryzen 7 5700U (8C/16T) but uses half the threads
# for balanced performance on CPU-only workloads.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    echo "Error: JENOVA_ROOT is not set. This file must be sourced by a Jenova launcher." >&2
    echo "       Set JENOVA_ROOT to the project root before sourcing this jenova.conf." >&2
    return 1 2>/dev/null || exit 1
fi
JCA_HOME="${JCA_HOME:-$HOME/JCA}"; export JCA_HOME
if [ "$JENOVA_LAYOUT" = "installed" ]; then
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/bin/llama-server}"
else
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/external/ext_bin/bin/llama-server}"
fi

# --- Model Auto-Discovery ---
. "$JENOVA_ROOT/lib/jenova-model.sh"

# --- Models ---
# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding ---
# Disabled for CPU-only to focus resources on main model
JENOVA_DRAFT="${JENOVA_DRAFT:-0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"

_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi

API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Inference ---
# CPU-only fallback profile using system RAM.
JENOVA_DEVICES="${JENOVA_DEVICES:-CPU}"
JENOVA_TENSOR_SPLIT="${JENOVA_TENSOR_SPLIT:-}"

# Context math: 16k ctx * 2 slots with q8_0 KV uses ≈ 512 MiB System RAM.
# Total usage for 4B model: ~4 GiB model + 512 MiB KV ≈ 4.5 GiB RAM.
# Watch out for heavy swap pressure if system RAM is limited (e.g., <8GB).
JENOVA_CTX_SIZE="${JENOVA_CTX_SIZE:-16384}"
JENOVA_NUM_SLOTS="${JENOVA_NUM_SLOTS:-2}"

# Threading math: Use roughly half your physical CPU cores for eval,
# and slightly more for batch prompt ingestion to maintain responsiveness.
JENOVA_THREADS="${JENOVA_THREADS:-4}"
JENOVA_THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# GPU offload: 0 (CPU only).
JENOVA_NGL="${JENOVA_NGL:-0}"
JENOVA_FIT_TARGET="${JENOVA_FIT_TARGET:-256}"

# --- Memory ---
JENOVA_KV_TYPE="${JENOVA_KV_TYPE:-q8_0}"
JENOVA_CACHE_TYPE_K="${JENOVA_CACHE_TYPE_K:-q8_0}"
JENOVA_CACHE_TYPE_V="${JENOVA_CACHE_TYPE_V:-q8_0}"

# --- Performance ---
JENOVA_FLASH_ATTN="${JENOVA_FLASH_ATTN:-0}"
JENOVA_MLOCK="${JENOVA_MLOCK:-1}"
JENOVA_MMAP="${JENOVA_MMAP:-1}"

# --- Logging ---
JENOVA_LOG_LEVEL="${JENOVA_LOG_LEVEL:-info}"
JENOVA_LOG_FILE="${JENOVA_LOG_FILE:-$JCA_HOME/var/log/llama-server.log}"

# --- Health monitoring ---
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-60}"