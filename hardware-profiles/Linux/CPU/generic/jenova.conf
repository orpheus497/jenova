#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — Linux CPU Profile
# Generic multi-core CPU with Ryzen-optimized threading
#
# Architecture: CPU-only inference optimized for Ryzen performance characteristics.
# Qwen2.5-3B-Instruct-Q8 — compact model suitable for CPU inference.
# Threading optimized based on Ryzen 7 5700U (8C/16T) but uses half the threads
# for balanced performance on CPU-only workloads.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    _EXE=$(realpath "$0")
    _DIR=$(dirname "$_EXE")
    if [ -f "$_DIR/etc/jenova.conf" ]; then
        _ROOT="$_DIR"
    elif [ -f "$(dirname "$_DIR")/etc/jenova.conf" ]; then
        _ROOT=$(dirname "$_DIR")
    else
        _ROOT=$(dirname "$(dirname "$(dirname "$(dirname "$_DIR")")")")
    fi
    JENOVA_ROOT="$_ROOT"
fi
LLAMA_SERVER="$JENOVA_ROOT/llama.cpp/build/bin/llama-server"

# --- Model Auto-Discovery ---
. "$JENOVA_ROOT/lib/jenova-model.sh"

# --- Models ---
# Final model paths with environment variable overrides
MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"
MODEL_DRAFT="${JENOVA_DRAFT_MODEL:-$MODEL_DRAFT}"
MODEL_EMBED="${JENOVA_EMBED_MODEL:-$MODEL_EMBED}"

# --- Speculative decoding ---
# Disabled for CPU-only to focus resources on main model
JENOVA_DRAFT="${JENOVA_DRAFT:-0}"

# --- Network ---
JENOVA_HOST="${JENOVA_HOST:-127.0.0.1}"
JENOVA_PORT="${JENOVA_PORT:-8080}"
JENOVA_EMBED_PORT="${JENOVA_EMBED_PORT:-8081}"
JENOVA_PROXY_PORT="${JENOVA_PROXY_PORT:-8082}"

# --- Inference ---
JENOVA_DEVICES="${JENOVA_DEVICES:-CPU}"
JENOVA_TENSOR_SPLIT="${JENOVA_TENSOR_SPLIT:-}"
JENOVA_CTX_SIZE="${JENOVA_CTX_SIZE:-16384}"
JENOVA_NUM_SLOTS="${JENOVA_NUM_SLOTS:-2}"
JENOVA_THREADS="${JENOVA_THREADS:-4}"
JENOVA_THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"
JENOVA_NGL="${JENOVA_NGL:-0}"
JENOVA_FIT_TARGET="${JENOVA_FIT_TARGET:-256}"

# --- Memory ---
JENOVA_KV_TYPE="${JENOVA_KV_TYPE:-q8_0}"
JENOVA_CACHE_TYPE_K="${JENOVA_CACHE_TYPE_K:-q8_0}"
JENOVA_CACHE_TYPE_V="${JENOVA_CACHE_TYPE_V:-q8_0}"

# --- Performance ---
JENOVA_FLASH_ATTN="${JENOVA_FLASH_ATTN:-0}"
JENOVA_MLOCK="${JENOVA_MLOCK:-1}"
JENOVA_MMAP="${JENOVA_MMAP:-1}"

# --- Logging ---
JENOVA_LOG_LEVEL="${JENOVA_LOG_LEVEL:-info}"
JENOVA_LOG_FILE="${JENOVA_LOG_FILE:-$JENOVA_ROOT/var/log/llama-server.log}"

# --- Health monitoring ---
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-60}"