#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — Vulkan Full Offload (12GB+ VRAM)
# Generic profile for systems with a Vulkan-capable GPU.
#
# Architecture: Full single-GPU offload for maximum performance.
# Agent model (e.g. 9B Q8_0) — high-quality agent on a single GPU.
# Requires 12+ GiB VRAM. For strict 8 GiB GPUs use JENOVA_CTX=8192 JENOVA_SLOTS=1.
# Suitable for NVIDIA RTX 3080/4070+ (10-12 GiB), AMD RX 6900/7900 (16 GiB), Intel Arc A770 (16 GiB).

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    echo "Error: JENOVA_ROOT is not set. This file must be sourced by a Jenova launcher." >&2
    echo "       Set JENOVA_ROOT to the project root before sourcing this jenova.conf." >&2
    return 1 2>/dev/null || exit 1
fi
JENOVA_HOME="${JENOVA_HOME:-$HOME/Jenova}"; export JENOVA_HOME
if [ "$JENOVA_LAYOUT" = "installed" ]; then
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/bin/llama-server}"
else
    LLAMA_SERVER="${LLAMA_SERVER:-$JENOVA_ROOT/external/llama.cpp/build/bin/llama-server}"
fi

# --- Model Auto-Discovery ---
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# --- Models ---
# Models are auto-discovered by lib/jenova-model.sh (sourced above).
# Environment variables (JENOVA_MODEL, JENOVA_DRAFT_MODEL, JENOVA_EMBED_MODEL)
# take precedence if set.
MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"
# Note: MODEL_DRAFT and MODEL_EMBED are already set by jenova-model.sh

# --- Speculative decoding ---
# Draft model accelerates the agent model.
# Draft model shares the same Vulkan device as the main model.
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then
    _INT_HOST="127.0.0.1"
fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Single Vulkan GPU (12GB+ VRAM) ---
# Full offload: Agent model (~6.75 GiB) + KV cache + draft model needs ~10 GiB VRAM.
# FIT_TARGET=1024: reserve 1 GiB safety margin for KV growth + draft model.
# For 8 GiB GPUs, set JENOVA_CTX=8192 and JENOVA_SLOTS=1 to reduce KV footprint.
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-1024}"

# GPU layers: Agent model (all layers) — full offload via auto-fit.
NGL_AGENT="${JENOVA_NGL_AGENT:-all}"

# --- Context & Slots ---
# Agent model with q8_0 KV: 32k ctx * 2 slots ≈ 3.5 GiB KV.
# Total: ~6.75 GiB model + 3.5 GiB KV + draft ≈ 10.85 GiB. Use with 12+ GiB GPUs.
# For 8 GiB GPUs: export JENOVA_CTX=8192 JENOVA_SLOTS=1 before starting.
CTX_SIZE="${JENOVA_CTX:-32768}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Batch sizes (controls VRAM pressure during prompt ingestion) ---
# Higher values = faster prompt eval but more VRAM staging buffers.
# Reduce on tight-VRAM GPUs to prevent Vulkan OOM and weight eviction.
BATCH_SIZE="${JENOVA_BATCH:-2048}"
UBATCH_SIZE="${JENOVA_UBATCH:-512}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)

# --- Health timeout ---
# Large models take time to load. Allow headroom for slow storage.
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-90}"

# --- Runtime ---
JENOVA_STATE="${JENOVA_STATE:-$JENOVA_HOME/.system}"
LOG_DIR="${LOG_DIR:-$JENOVA_ROOT/var/log}"
CACHE_DIR="${CACHE_DIR:-$JENOVA_ROOT/var/cache}"
PID_FILE="${PID_FILE:-$JENOVA_STATE/jenova-ca.pid}"
