#!/bin/sh
# Hardware Profile: FreeBSD i5-1135G7 dGPU-Only + Optane — 3B model
# This file describes the hardware profile for auto-detection matching.

PROFILE_NAME="Optane/dgpu/i5-1135g7-3b"
PROFILE_DESC="FreeBSD 15 | i5-1135G7 | GTX 1650 Ti (dGPU only) | Optane NVMe | Qwen2.5-3B Q8_0"

# --- Detection patterns (used by detect-hardware.sh) ---
# Manual deploy only — same CPU/dGPU as the dual-GPU profiles.
# Auto-detection prefers the dual-GPU profile (higher score from MATCH_GPU_1).
# Use this profile to deliberately exclude the Intel Iris Xe iGPU.
MATCH_CPU="i5-1135G7"
MATCH_GPU_0="NVIDIA"
MATCH_OS="FreeBSD"

# --- Hardware summary ---
HW_CPU="Intel i5-1135G7 (4P / 8T)"
HW_GPU_0="NVIDIA GTX 1650 Ti 4GB (Vulkan0) — discrete VRAM, sole inference device"
HW_RAM="16 GiB"
HW_SWAP="27 GiB Intel Optane NVMe (~7 μs latency)"
HW_STORAGE="ZFS"
HW_GPU_TOTAL_VRAM="4 GiB discrete only (iGPU excluded)"

# --- Inference strategy ---
STRATEGY="dgpu-only-optane-3b"
STRATEGY_DESC="Qwen2.5-Coder-3B Q8_0 (~3.1 GiB) fully offloaded to GTX 1650 Ti (4 GiB). 0.5B speculative drafter shares the same GPU (~644 MiB). 16K context / 2 slots with q8_0 KV cache (~256 MiB). Total ~4.0 GiB — tight fit, Optane swap-backed mdmfs catches overflow. iGPU deliberately excluded to avoid UMA contention with system RAM."

# --- Key config values (should match jenova.conf in this directory) ---
PROFILE_DEVICES="Vulkan0"
PROFILE_TENSOR_SPLIT=""
PROFILE_FIT_TARGET="128"
PROFILE_CTX_SIZE="16384"
PROFILE_NUM_SLOTS="2"
PROFILE_THREADS="4"
PROFILE_THREADS_BATCH="6"
PROFILE_NGL="all"
PROFILE_KV_TYPE="q8_0"
PROFILE_DRAFT="1"
PROFILE_HEALTH_TIMEOUT="90"
