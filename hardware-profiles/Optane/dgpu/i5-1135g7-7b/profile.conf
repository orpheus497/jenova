#!/bin/sh
# Hardware Profile: FreeBSD i5-1135G7 dGPU-Only + Optane — 7B model
# This file describes the hardware profile for auto-detection matching.

PROFILE_NAME="Optane/dgpu/i5-1135g7-7b"
PROFILE_DESC="FreeBSD 15 | i5-1135G7 | GTX 1650 Ti (dGPU only) | Optane NVMe | Qwen2.5-7B Q5_K_M partial offload"

# --- Detection patterns (used by detect-hardware.sh) ---
# Manual deploy only — same CPU/dGPU as the dual-GPU profiles.
# Auto-detection prefers profiles with higher GPU match scores.
# Use this profile for higher model quality at the cost of speed.
MATCH_CPU="i5-1135G7"
MATCH_GPU_0="NVIDIA"
MATCH_OS="FreeBSD"

# --- Hardware summary ---
HW_CPU="Intel i5-1135G7 (4P / 8T)"
HW_GPU_0="NVIDIA GTX 1650 Ti 4GB (Vulkan0) — discrete VRAM, sole inference device"
HW_RAM="16 GiB"
HW_SWAP="27 GiB Intel Optane NVMe (~7 μs latency)"
HW_STORAGE="ZFS"
HW_GPU_TOTAL_VRAM="4 GiB discrete only (iGPU excluded)"

# --- Inference strategy ---
STRATEGY="dgpu-only-optane-7b-partial"
STRATEGY_DESC="Qwen2.5-Coder-7B Q5_K_M (~4.8 GiB) partially offloaded to GTX 1650 Ti (4 GiB). ~16 of 28 layers on GPU, remainder on CPU. No speculative drafter (no VRAM budget). Single slot, 8K context to minimize KV footprint. Slower than 3B but higher model quality. Optane NVMe provides fast swap paging for CPU-resident layers."

# --- Key config values (should match jenova.conf in this directory) ---
PROFILE_DEVICES="Vulkan0"
PROFILE_TENSOR_SPLIT=""
PROFILE_FIT_TARGET="256"
PROFILE_CTX_SIZE="8192"
PROFILE_NUM_SLOTS="1"
PROFILE_THREADS="4"
PROFILE_THREADS_BATCH="6"
PROFILE_NGL="16"
PROFILE_KV_TYPE="q8_0"
PROFILE_DRAFT="0"
PROFILE_HEALTH_TIMEOUT="120"
