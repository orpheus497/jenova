#!/bin/sh
# Hardware Profile: FreeBSD i5-1135G7 dGPU-Only + Optane — 9B model
# This file describes the hardware profile for auto-detection matching.

PROFILE_NAME="FreeBSD/dgpu/i5-1135g7-9b"
PROFILE_DESC="FreeBSD 15 | i5-1135G7 | GTX 1650 Ti (dGPU only) | Optane NVMe | Qwen3.5-9B Q4_K_M"

# --- Detection patterns (used by detect-hardware.sh) ---
# Manual deploy only — same CPU/dGPU as the dual-GPU profiles.
# Auto-detection prefers the dual-GPU profile (higher score from MATCH_GPU_1).
# Use this profile to deliberately exclude the Intel Iris Xe iGPU.
MATCH_CPU="i5-1135G7"
MATCH_GPU_0="NVIDIA"
MATCH_OS="FreeBSD"

# --- Hardware summary ---
HW_CPU="Intel i5-1135G7 (4P / 8T)"
HW_GPU_0="NVIDIA GTX 1650 Ti 4GB (Vulkan0) — discrete VRAM, sole inference device"
HW_RAM="16 GiB"
HW_SWAP="27 GiB Intel Optane NVMe (~7 μs latency)"
HW_STORAGE="ZFS"
HW_GPU_TOTAL_VRAM="4 GiB discrete only (iGPU excluded)"

# --- Inference strategy ---
STRATEGY="dgpu-only-optane-9b"
STRATEGY_DESC="Qwen3.5-9B-Instruct-Q4_K_M (~5.5 GiB) partially offloaded to GTX 1650 Ti (4 GiB). ~20 of 36 layers on GPU, remainder on CPU. No speculative drafter (no VRAM budget). Single slot, 8K context to minimize KV footprint. Higher model quality with Optane NVMe fast swap paging."

# --- Key config values (should match jenova.conf in this directory) ---
PROFILE_DEVICES="Vulkan0"
PROFILE_TENSOR_SPLIT=""
PROFILE_FIT_TARGET="256"
PROFILE_CTX_SIZE="8192"
PROFILE_NUM_SLOTS="1"
PROFILE_THREADS="4"
PROFILE_THREADS_BATCH="6"
PROFILE_NGL="16"
PROFILE_KV_TYPE="q8_0"
PROFILE_DRAFT="0"
PROFILE_HEALTH_TIMEOUT="120"

# --- Model Recommendations ---
RECOMMENDED_AGENT_MODEL="Qwen3.5-9B-Instruct-Q4_K_M.gguf"
RECOMMENDED_AGENT_URL="https://huggingface.co/Qwen/Qwen3.5-9B-Instruct-GGUF/resolve/main/qwen3.5-9b-instruct-q4_k_m.gguf"
RECOMMENDED_EMBED_MODEL="Qwen3-Embedding-0.6B-Q8_0.gguf"
