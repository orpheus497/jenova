#!/bin/sh
# jenova.conf: Jenova Cognitive Architecture — dGPU-Only 3B Profile (Optane)
# FreeBSD 15 | GTX 1650 Ti 4GB (sole GPU) | i5-1135G7 | 16GB RAM | Optane NVMe
#
# Architecture: Single discrete GPU offload with speculative decoding.
# 9B Agent Model (~6.75 GiB) on GTX 1650 Ti and Optane NVMe.
# Intel Iris Xe iGPU deliberately excluded — avoids UMA contention with system RAM.
# 0.5B drafter shares the same Vulkan0 device (~0.6 GiB).
# Optane NVMe swap-backed mdmfs provides fast model loading and KV overflow paging.
# Total VRAM budget: ~6.75 + 0.6 + 0.3 = ~7.65 GiB — exceeds 4 GiB discrete, utilizes fast Optane swap.

# --- Paths ---
if [ -z "$JENOVA_ROOT" ]; then
    echo "Error: JENOVA_ROOT is not set. This file must be sourced by a Jenova launcher." >&2
    echo "       Set JENOVA_ROOT to the project root before sourcing this jenova.conf." >&2
    return 1 2>/dev/null || exit 1
fi
JENOVA_HOME="${JENOVA_HOME:-$HOME/Jenova}"; export JENOVA_HOME
if [ -z "$LLAMA_SERVER" ]; then
    if [ "$JENOVA_LAYOUT" = "installed" ]; then
        JENOVA_ROOT="${JENOVA_ROOT:-$JENOVA_HOME}"
        LLAMA_SERVER="$JENOVA_ROOT/bin/llama-server"
    else
        _script="$0"
        [ "${_script#*/*}" = "${_script}" ] && _script=$(command -v "$_script" 2>/dev/null || echo "$_script")
        _script_dir=$(dirname "$_script")
        command -v realpath >/dev/null 2>&1 && _script_dir=$(dirname "$(realpath "$_script")")
        JENOVA_ROOT="$(cd "${JENOVA_ROOT:-$_script_dir/..}" && pwd)"
        if [ -f "$JENOVA_ROOT/bin/llama-server" ]; then
            LLAMA_SERVER="$JENOVA_ROOT/bin/llama-server"
        else
            LLAMA_SERVER="$JENOVA_ROOT/external/llama.cpp/build/bin/llama-server"
        fi
    fi
fi

# --- Model Auto-Discovery ---
# shellcheck disable=SC1091
. "$JENOVA_ROOT/lib/jenova-model.sh"

# --- Models ---
# Models are auto-discovered by lib/jenova-model.sh (sourced above).
# Environment variables (JENOVA_MODEL, JENOVA_DRAFT_MODEL, JENOVA_EMBED_MODEL)
# take precedence if set.
MODEL_PATH="${JENOVA_MODEL:-$MODEL_AGENT}"
# Note: MODEL_DRAFT and MODEL_EMBED are already set by jenova-model.sh

# --- Speculative decoding ---
# Draft model accelerates target — both share Vulkan0 (GTX 1650 Ti).
JENOVA_DRAFT="${JENOVA_DRAFT:-1}"
DRAFT_DEVICE="${JENOVA_DRAFT_DEVICE:-Vulkan0}"

# --- Network ---
HOST="${JENOVA_HOST:-127.0.0.1}"
PORT="${JENOVA_PORT:-8080}"
LLAMA_PORT="${JENOVA_LLAMA_PORT:-8081}"
LLAMA_EMBED_PORT="${JENOVA_LLAMA_EMBED_PORT:-8082}"
_INT_HOST="$HOST"
if [ "$HOST" = "0.0.0.0" ] || [ "$HOST" = "::" ] || [ "$HOST" = "*" ]; then _INT_HOST="127.0.0.1"; fi
API_URL="http://${_INT_HOST}:${PORT}"
LLAMA_URL="http://${_INT_HOST}:${LLAMA_PORT}"
LLAMA_EMBED_URL="http://${_INT_HOST}:${LLAMA_EMBED_PORT}"

# --- Hardware: Single dGPU via Vulkan ---
# Vulkan0 = NVIDIA GTX 1650 Ti (4 GiB discrete GDDR6)
# iGPU excluded — no Vulkan1 device. Avoids UMA stealing system RAM for GPU alloc.
# FIT_TARGET=128: minimal safety margin — Optane swap catches overflow at ~7 μs.
DEVICES="${JENOVA_DEVICES:-Vulkan0}"
TENSOR_SPLIT=""
FIT_TARGET="${JENOVA_FITT:-128}"

# GPU layers: 9B (40 layers) — full offload to single dGPU.
NGL_AGENT="${JENOVA_NGL_AGENT:-all}"

# --- Context & Slots ---
# 9B with q8_0 KV: 16k ctx * 2 slots ≈ 256 MiB KV.
# Total: ~6.75 GiB model + 0.6 GiB draft + 0.3 GiB KV ≈ 7.65 GiB.
# Optane NVMe swap pages KV overflow during long sessions (~7 μs latency).
# Model loaded from swap-backed mdmfs at /mnt/jenova-models.
CTX_SIZE="${JENOVA_CTX:-16384}"
NUM_SLOTS="${JENOVA_SLOTS:-2}"
KV_CACHE_TYPE="${JENOVA_KV_TYPE:-q8_0}"

# --- Threads: i5-1135G7 = 4P cores / 8 logical ---
THREADS="${JENOVA_THREADS:-4}"
THREADS_BATCH="${JENOVA_THREADS_BATCH:-6}"

# --- Batch sizes (controls VRAM pressure during prompt ingestion) ---
# Reduced for tight-VRAM GPUs (4 GiB dGPU / 2-4 GiB UMA) to prevent
# Vulkan OOM that thrashes model weights out of VRAM onto swap.
BATCH_SIZE="${JENOVA_BATCH:-512}"
UBATCH_SIZE="${JENOVA_UBATCH:-128}"

# --- Agent ---
MAX_TURNS="${JENOVA_MAX_TURNS:-25}"
MAX_ACTIONS=20
TIMEOUT="${JENOVA_TIMEOUT:-600}"

# --- Watchdog ---
# JENOVA_WATCH_INTERVAL: seconds between health polls (default 30)

# --- Health timeout ---
# 9B (~6.75 GiB) loads from Optane-backed mdmfs — fast but slightly slower
# than dual-GPU cold start due to single device initialization.
JENOVA_HEALTH_TIMEOUT="${JENOVA_HEALTH_TIMEOUT:-90}"

# --- Runtime ---
JENOVA_STATE="${JENOVA_STATE:-$JENOVA_HOME/.system}"
LOG_DIR="${LOG_DIR:-$JENOVA_ROOT/var/log}"
CACHE_DIR="${CACHE_DIR:-$JENOVA_ROOT/var/cache}"
PID_FILE="${PID_FILE:-$JENOVA_STATE/jenova-ca.pid}"
